<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>審查委員推薦表 - 全聯會美容醫學工作小組</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root { --primary:#1a4a6e; --accent:#c8933a; --bg:#f5f3ef; --border:#d9d3c8; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }
  .banner { background:var(--primary); color:#fff; padding:36px 32px 30px; border-bottom:4px solid var(--accent); text-align:center; }
  .banner .org { font-size:12px; letter-spacing:2px; color:rgba(255,255,255,.6); margin-bottom:10px; }
  .banner h1 { font-family:'Noto Serif TC',serif; font-size:20px; font-weight:700; line-height:1.65; }
  .wrap { max-width:560px; margin:0 auto; padding:48px 20px; flex:1; }
  .subtitle { text-align:center; font-size:14px; color:#6b6560; margin-bottom:36px; line-height:1.8; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .form-card {
    background:#fff; border:1px solid var(--border); border-radius:8px;
    padding:28px 24px; text-decoration:none; color:inherit;
    transition:all .2s; box-shadow:0 1px 4px rgba(0,0,0,.05);
    display:flex; flex-direction:column; gap:12px;
  }
  .form-card:hover { border-color:var(--primary); box-shadow:0 4px 20px rgba(26,74,110,.12); transform:translateY(-2px); }
  .card-icon { font-size:28px; }
  .card-badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:1px; }
  .badge-a { background:#eef3f8; color:var(--primary); }
  .badge-b { background:#eaf2ec; color:#2d5c3a; }
  .card-title { font-family:'Noto Serif TC',serif; font-size:16px; font-weight:700; color:var(--primary); line-height:1.5; }
  .card-desc { font-size:13px; color:#6b6560; line-height:1.7; }
  .card-arrow { font-size:18px; color:var(--accent); margin-top:auto; }
  .footer { text-align:center; padding:20px; font-size:12px; color:#aaa; }
  @media(max-width:480px) { .cards { grid-template-columns:1fr; } .banner h1 { font-size:16px; } }
</style>
</head>
<body>
<div class="banner">
  <div class="org">中華民國醫師公會全國聯合會</div>
  <h1>美容醫學工作小組／審查分組<br>推薦表</h1>
</div>
<div class="wrap">
  <p class="subtitle">
    請依推薦對象選擇對應表單填寫。<br>
    如有任何問題，請與本會聯繫。
  </p>
  <div class="cards">
    <a href="formA.html" class="form-card">
      <div class="card-icon">🏛️</div>
      <div><span class="card-badge badge-a">每會限推薦 1 名</span></div>
      <div class="card-title">美容醫學工作小組<br>委員推薦表</div>
      <div class="card-desc">推薦擔任美容醫學工作小組委員之人選，負責統籌審查作業。</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="formB.html" class="form-card">
      <div class="card-icon">👥</div>
      <div><span class="card-badge badge-b">每會可推薦若干名</span></div>
      <div class="card-title">審查【分組】<br>委員推薦表</div>
      <div class="card-desc">推薦具各類審查專長之委員，建立審查委員人才庫（P1–P3 / S1–S6）。</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
</div>
<div class="footer">中華民國醫師公會全國聯合會</div>
</body>
</html>
